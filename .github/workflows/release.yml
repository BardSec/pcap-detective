name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build .app bundle
        run: pyinstaller build/bloodhound.spec --distpath dist --workpath build/output --noconfirm

      - name: Import signing certificate
        if: env.APPLE_CERTIFICATE_BASE64 != ''
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_FILE=$(mktemp /tmp/cert.XXXXXX.p12)
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERT_FILE"
          KEYCHAIN="build.keychain"
          security create-keychain -p "" "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security unlock-keychain -p "" "$KEYCHAIN"
          security import "$CERT_FILE" -k "$KEYCHAIN" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" "$KEYCHAIN"
          rm -f "$CERT_FILE"

      - name: Code sign .app bundle
        if: env.APPLE_CERTIFICATE_BASE64 != ''
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          IDENTITY="Developer ID Application: BardSec ($APPLE_TEAM_ID)"
          # Sign all nested frameworks and dylibs first
          find "dist/PCAP Detective.app" -name "*.dylib" -o -name "*.so" -o -name "*.framework" | while read f; do
            codesign --force --options runtime --entitlements build/entitlements.plist --sign "$IDENTITY" "$f" 2>/dev/null || true
          done
          # Sign the main executable
          codesign --force --options runtime --entitlements build/entitlements.plist --sign "$IDENTITY" "dist/PCAP Detective.app/Contents/MacOS/PCAP Detective"
          # Sign the app bundle
          codesign --force --deep --options runtime --entitlements build/entitlements.plist --sign "$IDENTITY" "dist/PCAP Detective.app"
          # Verify
          codesign -dv --verbose "dist/PCAP Detective.app"

      - name: Create DMG
        run: |
          hdiutil create -volname "PCAP Detective" \
            -srcfolder "dist/PCAP Detective.app" \
            -ov -format UDZO \
            "dist/PCAP-Detective-macOS.dmg"

      - name: Notarize DMG
        if: env.APPLE_ID != ''
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit "dist/PCAP-Detective-macOS.dmg" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "dist/PCAP-Detective-macOS.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PCAP-Detective-macOS
          path: dist/PCAP-Detective-macOS.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build .exe
        run: pyinstaller build/bloodhound-win.spec --distpath dist --workpath build/output --noconfirm

      - name: Create ZIP
        shell: pwsh
        run: Compress-Archive -Path "dist/PCAP Detective/*" -DestinationPath "dist/PCAP-Detective-Windows.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PCAP-Detective-Windows
          path: dist/PCAP-Detective-Windows.zip

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: PCAP-Detective-macOS

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: PCAP-Detective-Windows

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            PCAP-Detective-macOS.dmg
            PCAP-Detective-Windows.zip
