name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build .app bundle
        run: pyinstaller build/bloodhound.spec --distpath dist --workpath build/output --noconfirm

      - name: Create ZIP
        working-directory: dist
        run: zip -r "PCAP-Bloodhound-macOS.zip" "PCAP Bloodhound.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PCAP-Bloodhound-macOS
          path: dist/PCAP-Bloodhound-macOS.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build .exe
        run: pyinstaller build/bloodhound-win.spec --distpath dist --workpath build/output --noconfirm

      - name: Create ZIP
        shell: pwsh
        run: Compress-Archive -Path "dist/PCAP Bloodhound/*" -DestinationPath "dist/PCAP-Bloodhound-Windows.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PCAP-Bloodhound-Windows
          path: dist/PCAP-Bloodhound-Windows.zip

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: PCAP-Bloodhound-macOS

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: PCAP-Bloodhound-Windows

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            PCAP-Bloodhound-macOS.zip
            PCAP-Bloodhound-Windows.zip
