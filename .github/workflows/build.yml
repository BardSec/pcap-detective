name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build .app bundle
        run: pyinstaller build/bloodhound.spec --distpath dist --workpath build/output --noconfirm

      - name: Create ZIP
        working-directory: dist
        run: zip -r "PCAP-Detective-macOS.zip" "PCAP Detective.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PCAP-Detective-macOS
          path: dist/PCAP-Detective-macOS.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build .exe
        run: pyinstaller build/bloodhound-win.spec --distpath dist --workpath build/output --noconfirm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PCAP-Detective-Windows
          path: dist/PCAP Detective/
